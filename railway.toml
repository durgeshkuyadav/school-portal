# ============================================================
# Railway Deployment Config — School Portal
# Deploy: Push this file to GitHub → Railway auto deploys
# Docker Hub: durgeshkuyadav/<service-name>:latest
# ============================================================

[build]
builder = "nixpacks"

# ─────────────────────────────────────────────
# EUREKA SERVER (Service Registry)
# ─────────────────────────────────────────────
[[services]]
name = "eureka-server"

[services.deploy]
startCommand = "java $JAVA_OPTS -jar app.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[services.build]
image = "durgeshkuyadav/eureka-server:latest"

[services.variables]
JAVA_OPTS = "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m"
SERVER_PORT = "8761"

# ─────────────────────────────────────────────
# API GATEWAY
# ─────────────────────────────────────────────
[[services]]
name = "api-gateway"

[services.deploy]
startCommand = "java $JAVA_OPTS -jar app.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[services.build]
image = "durgeshkuyadav/api-gateway:latest"

[services.variables]
SPRING_PROFILES_ACTIVE = "docker"
EUREKA_SERVER_URL = "http://eureka-server.railway.internal:8761/eureka"
JWT_SECRET = "schoolPortalSecretKey2026VeryLongAndSecure"
SERVER_PORT = "8080"
JAVA_OPTS = "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m"

# ─────────────────────────────────────────────
# AUTH SERVICE
# ─────────────────────────────────────────────
[[services]]
name = "auth-service"

[services.deploy]
startCommand = "java $JAVA_OPTS -jar app.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 90
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[services.build]
image = "durgeshkuyadav/auth-service:latest"

[services.variables]
SPRING_PROFILES_ACTIVE = "docker"
DB_URL = "jdbc:mysql://${{MySQL.MYSQL_HOST}}:${{MySQL.MYSQL_PORT}}/school_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
DB_USER = "${{MySQL.MYSQL_USER}}"
DB_PASS = "${{MySQL.MYSQL_PASSWORD}}"
REDIS_HOST = "${{Redis.REDIS_HOST}}"
REDIS_PORT = "${{Redis.REDIS_PORT}}"
EUREKA_SERVER_URL = "http://eureka-server.railway.internal:8761/eureka"
JWT_SECRET = "schoolPortalSecretKey2026VeryLongAndSecure"
JWT_EXPIRY_MS = "3600000"
JWT_REFRESH_EXPIRY_MS = "604800000"
SERVER_PORT = "8081"
JAVA_OPTS = "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m"

