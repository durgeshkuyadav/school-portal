volumes:
  mysql-auth-data:
  mysql-student-data:
  mysql-academic-data:
  mysql-teacher-data:
  mysql-calendar-data:
  mysql-test-data:
  mongo-content-data:
  redis-data:
  kafka-data:
  zookeeper-data:

services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    restart: unless-stopped
    init: true
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30 || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 60s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    init: true
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30 || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 90s

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # DATABASES — MySQL 8.0
  # ─────────────────────────────────────────────

  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    restart: unless-stopped
    ports:
      - "3307:3306"                             # 3307 taaki local MySQL se conflict na ho
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: school_auth
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_pass
    volumes:
      - mysql-auth-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
             --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --innodb-buffer-pool-size=128M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  mysql-student:
    image: mysql:8.0
    container_name: mysql-student
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: school_student
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_pass
    volumes:
      - mysql-student-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
             --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --innodb-buffer-pool-size=64M
             --max-connections=100
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  mysql-academic:
    image: mysql:8.0
    container_name: mysql-academic
    restart: unless-stopped
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: school_academic
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_pass
    volumes:
      - mysql-academic-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
             --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --innodb-buffer-pool-size=64M
             --max-connections=100
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  mysql-teacher:
    image: mysql:8.0
    container_name: mysql-teacher
    restart: unless-stopped
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: school_teacher
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_pass
    volumes:
      - mysql-teacher-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
             --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --innodb-buffer-pool-size=64M
             --max-connections=100
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  mysql-calendar:
    image: mysql:8.0
    container_name: mysql-calendar
    restart: unless-stopped
    ports:
      - "3311:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: school_calendar
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_pass
    volumes:
      - mysql-calendar-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
             --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --innodb-buffer-pool-size=64M
             --max-connections=100
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  mysql-test:
    image: mysql:8.0
    container_name: mysql-test
    restart: unless-stopped
    ports:
      - "3312:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: school_test
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_pass
    volumes:
      - mysql-test-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
             --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --innodb-buffer-pool-size=64M
             --max-connections=100
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  mongo-content:
    image: mongo:7.0
    container_name: mongo-content
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: school_content
    volumes:
      - mongo-content-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ─────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-schoolPortalSecretKey2026VeryLongAndSecure}
      JAVA_OPTS: "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      mysql-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql-auth:3306/school_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      DB_USER: root
      DB_PASS: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-schoolPortalSecretKey2026VeryLongAndSecure}
      JWT_EXPIRY_MS: 3600000
      JWT_REFRESH_EXPIRY_MS: 604800000
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      JAVA_OPTS: "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

  student-service:
    build:
      context: ./student-service
      dockerfile: Dockerfile
    container_name: student-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      mysql-student:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql-student:3306/school_student?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      DB_USER: root
      DB_PASS: root
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      JAVA_OPTS: "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

  academic-service:
    build:
      context: ./academic-service
      dockerfile: Dockerfile
    container_name: academic-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    depends_on:
      mysql-academic:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql-academic:3306/school_academic?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      DB_USER: root
      DB_PASS: root
      KAFKA_BOOTSTRAP: kafka:29092
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      JAVA_OPTS: "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

  teacher-service:
    build:
      context: ./teacher-service
      dockerfile: Dockerfile
    container_name: teacher-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    depends_on:
      mysql-teacher:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql-teacher:3306/school_teacher?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      DB_USER: root
      DB_PASS: root
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      JAVA_OPTS: "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

  content-service:
    build:
      context: ./content-service
      dockerfile: Dockerfile
    container_name: content-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    depends_on:
      mongo-content:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MONGO_URI: mongodb://mongo-content:27017/school_content
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      JAVA_OPTS: "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

  calendar-service:
    build:
      context: ./calendar-service
      dockerfile: Dockerfile
    container_name: calendar-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    depends_on:
      mysql-calendar:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql-calendar:3306/school_calendar?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      DB_USER: root
      DB_PASS: root
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      JAVA_OPTS: "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

  online-test-service:
    build:
      context: ./online-test-service
      dockerfile: Dockerfile
    container_name: online-test-service
    restart: unless-stopped
    ports:
      - "8091:8091"
    depends_on:
      mysql-test:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql-test:3306/school_test?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      DB_USER: root
      DB_PASS: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      JAVA_OPTS: "-Xmx192m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8089:8089"
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP: kafka:29092
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-your@gmail.com}
      MAIL_PASS: ${MAIL_PASS:-yourpassword}
      JAVA_OPTS: "-Xmx128m -Xms48m -XX:+UseSerialGC -XX:MaxMetaspaceSize=96m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/actuator/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

  # ─────────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
