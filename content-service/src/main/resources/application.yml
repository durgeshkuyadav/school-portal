# ═══════════════════════════════════════════════
# CONTENT SERVICE — application.yml
# Spring Boot 3.3.4 | School Management Portal
# ═══════════════════════════════════════════════

server:
  port: 8085
  shutdown: graceful

spring:
  application:
    name: content-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  lifecycle:
    timeout-per-shutdown-phase: 20s

  # ── MongoDB ───────────────────────────────
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/school_content}
      auto-index-creation: true             # Indexes auto ban jayenge
      uuid-representation: STANDARD

  # ── File Upload ──────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

# ── Eureka ────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ── Actuator ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    mongo:
      enabled: true

# ── SpringDoc / Swagger ───────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# ── Logging ───────────────────────────────────
logging:
  level:
    root: INFO
    com.school.content: DEBUG
    org.springframework.data.mongodb: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
