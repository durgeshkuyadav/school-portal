# ═══════════════════════════════════════════════════════════════════
# SCHOOL PORTAL — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════
#
# TRIGGERS:
#   push  → main/develop  : Full build + test + Docker push
#   PR    → main          : Build + test only (no push)
#   tag   → v*.*.*        : Full build + push + GitHub Release
#
# STAGES:
#   1. lint-and-validate  : YAML lint, Docker Compose validate
#   2. build-backend      : Maven build + unit tests (parallel per service)
#   3. build-frontend     : npm build + lint
#   4. docker-build-push  : Build & push all images to Docker Hub
#   5. integration-test   : Spin up stack, run health checks
#   6. deploy             : SSH deploy to server (on main branch only)
#   7. notify             : Summary + badge update
#
# SECRETS REQUIRED (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME    : Your Docker Hub username
#   DOCKERHUB_TOKEN       : Docker Hub access token
#   DEPLOY_HOST           : Server IP/hostname (for SSH deploy)
#   DEPLOY_USER           : SSH username
#   DEPLOY_SSH_KEY        : Private SSH key (PEM format)
#   DEPLOY_PATH           : Path on server e.g. /home/ubuntu/school-portal
# ═══════════════════════════════════════════════════════════════════
# ═══════════════════════════════════════════════════════════════════
# SCHOOL PORTAL — CI/CD Pipeline (FIXED v2)
# FIXES:
#   ✅ secrets.DEPLOY_HOST in run: shell → now uses env var
#   ✅ No duplicate summary job
#   ✅ Changelog added to release
# ═══════════════════════════════════════════════════════════════════

name: 🏫 School Portal CI/CD

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/school-portal
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validate:
    name: 🔍 Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate package.json
        run: |
          cd frontend
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"
          echo "✅ package.json valid"

      - name: Check import paths
        run: |
          cd frontend
          python3 - << 'PYEOF'
          import os, re, sys
          src = 'src'
          errors = []
          for root, dirs, files in os.walk(src):
              dirs[:] = [d for d in dirs if d != 'node_modules']
              for f in files:
                  if not (f.endswith('.jsx') or f.endswith('.js')):
                      continue
                  fpath = os.path.join(root, f)
                  file_dir = os.path.dirname(fpath)
                  with open(fpath) as fh:
                      for i, line in enumerate(fh, 1):
                          m = re.search(r"from ['\"](\.[^'\"]+)['\"]", line)
                          if not m: continue
                          resolved = os.path.normpath(os.path.join(file_dir, m.group(1)))
                          if not resolved.startswith(src):
                              errors.append(f"  {fpath}:{i} -> outside src/")
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          else:
              print("✅ All imports valid")
          PYEOF

  build-backend:
    name: ☕ Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - auth-service
          - student-service
          - academic-service
          - content-service
          - teacher-service
          - calendar-service
          - online-test-service
          - notification-service
          - attendance-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests --no-transfer-progress -q
          echo "✅ ${{ matrix.service }} built"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.service }}
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 1

  build-frontend:
    name: ⚛️ Build Frontend
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps --silent

      - name: Build React app
        run: |
          cd frontend
          NODE_OPTIONS=--openssl-legacy-provider GENERATE_SOURCEMAP=false CI=false npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  docker-build-push:
    name: 🐳 Docker ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [ build-backend, build-frontend ]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - auth-service
          - student-service
          - academic-service
          - content-service
          - teacher-service
          - calendar-service
          - online-test-service
          - notification-service
          - attendance-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        if: matrix.service != 'frontend'
        uses: actions/download-artifact@v4
        with:
          name: jar-${{ matrix.service }}
          path: ${{ matrix.service }}/target/
        continue-on-error: true

      - name: Download frontend build
        if: matrix.service == 'frontend'
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          PREFIX="${{ env.IMAGE_PREFIX }}-${{ matrix.service }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tags=${PREFIX}:${{ github.ref_name }},${PREFIX}:latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tags=${PREFIX}:latest,${PREFIX}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${PREFIX}:develop,${PREFIX}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file:    ./${{ matrix.service }}/Dockerfile
          push:    true
          tags:    ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      # ✅ FIX: Pass secrets as env vars so shell can read them safely
      HAS_DEPLOY_HOST: ${{ secrets.DEPLOY_HOST != '' && 'true' || 'false' }}
    steps:
      - name: Check deploy config
        id: check
        run: |
          if [ "${HAS_DEPLOY_HOST}" = "true" ]; then
            echo "has_server=true" >> $GITHUB_OUTPUT
          else
            echo "has_server=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.has_server == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          timeout:  300s
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            echo "✅ School Portal deployed successfully!"

      - name: Skip notice
        if: steps.check.outputs.has_server == 'false'
        run: |
          echo "⚠️ Auto-deploy skipped (no server configured)"
          echo "Add DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH to GitHub Secrets to enable."

  release:
    name: 📦 GitHub Release
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            CHANGES=$(git log ${PREV}..HEAD --pretty=format:"- %s (%h)" --no-merges | head -30)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi
          {
            echo 'changelog<<EOF'
            echo "$CHANGES"
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🏫 School Portal ${{ github.ref_name }}"
          body: |
            ## 🏫 School Portal ${{ github.ref_name }}

            ### 🚀 Quick Deploy
            ```bash
            git clone https://github.com/durgeshkuyadav/school-portal.git
            cd school-portal
            docker compose up -d
            ```

            ### 📝 Changes
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}

  summary:
    name: 📋 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [ validate, build-backend, build-frontend ]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## 🏫 School Portal — Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ☕ Build Backend | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚛️ Build Frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\` | Actor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY