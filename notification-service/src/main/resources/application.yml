# ═══════════════════════════════════════════════
# NOTIFICATION SERVICE — application.yml
# Spring Boot 3.3.4 | School Management Portal
# ═══════════════════════════════════════════════

server:
  port: 8089
  shutdown: graceful

spring:
  application:
    name: notification-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  lifecycle:
    timeout-per-shutdown-phase: 20s

  # ✅ Mail auto-config ENABLE kar diya
  # autoconfigure exclude HATA DIYA

  # ── Mail Config ──────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:kpmedicalshop0@gmail.com}
    password: ${MAIL_PASS:cwlj kapx jmwj cvdq}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 3000
        writetimeout: 5000

  # ── Kafka Consumer ────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 10
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

# ── Eureka ────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ── Actuator ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# ── App Config ────────────────────────────────
app:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_USER:noreply@school.com}

# ── Logging ───────────────────────────────────
logging:
  level:
    root: INFO
    com.school.notification: DEBUG
    org.springframework.kafka: WARN
    org.springframework.mail: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
