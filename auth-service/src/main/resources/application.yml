# ═══════════════════════════════════════════════
# AUTH SERVICE — application.yml
# Spring Boot 3.3.4 | MySQL | School Portal
# ═══════════════════════════════════════════════

server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  lifecycle:
    timeout-per-shutdown-phase: 20s

  # ── Database (MySQL) ───────────────────────
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/school_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: auth-hikari-pool
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1

  # ── JPA / Hibernate ───────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
        use_sql_comments: false

  # ── Redis (Token Blacklist) ────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 1000ms

# ── JWT Config ────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:schoolPortalSecretKey2026VeryLongAndSecure}
    expiry-ms: ${JWT_EXPIRY_MS:3600000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

# ── Eureka ────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# ── Actuator ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true

# ── SpringDoc / Swagger ───────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# ── Logging ───────────────────────────────────
logging:
  level:
    root: INFO
    com.school.auth: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
